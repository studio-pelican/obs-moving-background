<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OBS Moving Background</title>
  <style>
    /* 共通リセットとベース設定 */
    body, html {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background-color: transparent; /* OBS透過用 */
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* 背景レイヤー（CSSアニメーション） */
    #bg-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -3;
    }

    /* キャンバスレイヤー（パーティクル） */
    #canvas-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
    }

    /* UI用コンテナ */
    #ui-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* 配置用の共通クラス */
    .pos-top-left { top: 10px; left: 20px; text-align: left; bottom: auto; right: auto; }
    .pos-top-right { top: 10px; right: 20px; text-align: right; bottom: auto; left: auto; }
    .pos-bottom-left { bottom: 10px; left: 20px; text-align: left; top: auto; right: auto; }
    .pos-bottom-right { bottom: 10px; right: 20px; text-align: right; top: auto; left: auto; }

    /* 日付・デジタル時計エリア */
    #time-area {
      position: absolute;
      color: white;
      text-shadow: 0 4px 10px rgba(0,0,0,0.5);
      padding: 15px;
      z-index: 10;
    }

    #date {
      font-size: 1.2rem;
      font-weight: bold;
      letter-spacing: 0.1em;
      margin-bottom: -5px;
      opacity: 0.9;
    }

    #clock {
      font-size: 3rem;
      font-weight: bold;
      letter-spacing: 0.1em;
    }

    /* 配信者名 */
    #name-area {
      position: absolute;
      padding: 15px; /* text-shadowが途切れないための余白 */
      font-size: 3rem;
      font-weight: bold;
      text-shadow: 0 4px 10px rgba(0,0,0,0.5);
      color: white;
      
      /* 省略表記のための設定 */
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      box-sizing: border-box;
      z-index: 11; /* 時計より優先 */
      transform: translateZ(0); /* OBSのレンダリングバグ(表示消失)防止 */
    }
    


    /* ------------------------------
       Talkテーマ（デフォルト）
    ------------------------------ */
    body.theme-talk #bg-layer {
      /* デフォルトのグラデーションカラー（CSS変数で上書き可能） */
      --c1: #1a0b2e;
      --c2: #4a2b53;
      --c3: #2d1a42;
      background: linear-gradient(45deg, var(--c1), var(--c2), var(--c3), var(--c1));
      background-size: 400% 400%;
      animation: gradientBG 20s ease infinite;
    }
    
    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ------------------------------
       Gameテーマ
    ------------------------------ */
    body.theme-game #bg-layer {
      background-color: #0b0c10;
      background-image: 
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      perspective: 1000px; /* 3D空間の奥行き */
      overflow: hidden;
    }
    
    /* サイバーグリッドのアニメーション */
    .cyber-grid {
      display: none;
      position: absolute;
      bottom: -40%;
      left: -50%;
      width: 200%;
      height: 100%;
      --cc: #00f3ff; /* デフォルトのネオンカラー */
      background-image: 
        linear-gradient(var(--cc) 2px, transparent 2px),
        linear-gradient(90deg, var(--cc) 2px, transparent 2px);
      background-size: 80px 80px;
      transform: rotateX(75deg);
      animation: gridMove 3s linear infinite;
      opacity: 0.25;
    }

    @keyframes gridMove {
      0% { background-position: 0 0; }
      100% { background-position: 0 80px; }
    }

    body.theme-game .cyber-grid {
      display: block;
    }

    /* Gameテーマ用フォントと光彩エフェクト */
    body.theme-game #time-area, 
    body.theme-game #name-area {
      font-family: 'Consolas', 'Courier New', monospace;
      color: var(--cc, #00f3ff);
      text-shadow: 0 0 10px var(--cc, #00f3ff), 0 0 30px var(--cc, #00f3ff);
      font-weight: bold;
    }


  </style>
</head>
<body class="theme-talk"> <!-- デフォルトはTalkテーマ -->

  <!-- 背景領域 -->
  <div id="bg-layer">
    <div class="cyber-grid"></div>
  </div>



  <!-- パーティクル領域 -->
  <canvas id="canvas-layer"></canvas>

  <!-- 前面テキスト系UI -->
  <div id="ui-container">
    <div id="time-area">
      <div id="date">YYYY/MM/DD (Day)</div>
      <div id="clock">00:00:00</div>
    </div>
    <div id="name-area"></div>
  </div>

  <script>
    // -----------------------------------------------------------------
    // 1. URLパラメータの取得と適用
    // -----------------------------------------------------------------
    const params = new URLSearchParams(window.location.search);
    const theme = params.get('theme') === 'game' ? 'game' : 'talk';
    const streamerName = params.get('name') || '';
    const customColor = params.get('custom'); // "#"が含まれる場合はURLエンコード (%23) されている必要がある

    // 表示位置のパラメータ取得 (デフォルト: 配信者名=左下, 時計=右上)
    const posMapping = {
      '左上': 'top-left',
      '右上': 'top-right',
      '左下': 'bottom-left',
      '右下': 'bottom-right',
      'top-left': 'top-left',
      'top-right': 'top-right',
      'bottom-left': 'bottom-left',
      'bottom-right': 'bottom-right'
    };
    
    let namePos = posMapping[params.get('namePos')] || 'bottom-left';
    let timePos = posMapping[params.get('timePos')] || 'top-right';

    const body = document.body;
    body.className = `theme-${theme}`;

    const nameArea = document.getElementById('name-area');
    const timeArea = document.getElementById('time-area');
    
    if (streamerName) {
      nameArea.textContent = streamerName;
    }

    // 表示位置のクラスを適用
    nameArea.classList.add(`pos-${namePos}`);
    timeArea.classList.add(`pos-${timePos}`);

    // 位置が被った場合は配信者名を優先し、時計を非表示にする
    const isSameRow = (namePos.startsWith('top') && timePos.startsWith('top')) || 
                      (namePos.startsWith('bottom') && timePos.startsWith('bottom'));

    if (namePos === timePos && streamerName) {
      timeArea.style.display = 'none';
      nameArea.style.maxWidth = 'calc(100vw - 40px)'; // ほぼ全幅使用可能
    } else if (isSameRow) {
      // 同じ高さにある場合は時計と被らないように幅を制限する
      nameArea.style.maxWidth = 'calc(100vw - 400px)';
    } else {
      // 違う高さなら幅制限を緩める
      nameArea.style.maxWidth = 'calc(100vw - 40px)';
    }

    // カスタムカラーの上書き
    if (customColor) {
      if (theme === 'talk') {
        body.style.setProperty('--c2', customColor);
        
        // テーマカラーに応じた背景グラデーションを自動生成するため、様々な色形式(HEX/色名)をRGBに変換
        const tempDiv = document.createElement('div');
        tempDiv.style.color = customColor;
        document.body.appendChild(tempDiv);
        const rgbColor = window.getComputedStyle(tempDiv).color; // 例: "rgb(255, 0, 0)"
        document.body.removeChild(tempDiv);
        
        const match = rgbColor.match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/);
        if (match) {
          const r = parseInt(match[1], 10);
          const g = parseInt(match[2], 10);
          const b = parseInt(match[3], 10);
          
          // c1をより暗く(20%)、c3を少し暗く(40%)設定してグラデーションを作る
          body.style.setProperty('--c1', `rgb(${Math.floor(r * 0.2)}, ${Math.floor(g * 0.2)}, ${Math.floor(b * 0.2)})`);
          body.style.setProperty('--c3', `rgb(${Math.floor(r * 0.4)}, ${Math.floor(g * 0.4)}, ${Math.floor(b * 0.4)})`);
        }
      } else if (theme === 'game') {
        // Gameテーマでは全体的なネオンカラーを上書き
        body.style.setProperty('--cc', customColor);
      }
    }

    // テーマ基本色の取得ロジック (パーティクル描画時に参照)
    function getThemeColor() {
      if (customColor) return customColor;
      return theme === 'game' ? '#00f3ff' : '#ffffff';
    }

    // -----------------------------------------------------------------
    // 2. JSTデジタル時計の更新 (Asia/Tokyo固定)
    // -----------------------------------------------------------------
    const dateEl = document.getElementById('date');
    const clockEl = document.getElementById('clock');
    
    function updateClock() {
      const now = new Date();
      
      // JSTの時刻を取得
      const timeString = now.toLocaleTimeString('ja-JP', {
        timeZone: 'Asia/Tokyo',
        hour12: false,
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      });
      clockEl.textContent = timeString;

      // JSTの日付を取得してフォーマット
      const jstNow = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Tokyo' }));
      const y = jstNow.getFullYear();
      const m = String(jstNow.getMonth() + 1).padStart(2, '0');
      const d = String(jstNow.getDate()).padStart(2, '0');
      const days = ['日', '月', '火', '水', '木', '金', '土'];
      const dayStr = days[jstNow.getDay()];
      dateEl.textContent = `${y}/${m}/${d} (${dayStr})`;
      
      // 次のフレームで更新ループ
      requestAnimationFrame(updateClock);
    }
    updateClock(); // 初期実行

    // -----------------------------------------------------------------
    // 3. Canvasによるパーティクルアニメーション
    // -----------------------------------------------------------------
    const canvas = document.getElementById('canvas-layer');
    const ctx = canvas.getContext('2d');
    let width, height;

    function resizeCanvas() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle {
      constructor() {
        this.reset(true);
      }

      reset(initial = false) {
        if (theme === 'talk') {
          // 星やシャボン玉風の丸いパーティクル
          this.size = Math.random() * 6 + 1;
          this.x = Math.random() * width;
          // 初期時は画面全体、リセット時は画面下部から出現
          this.y = initial ? Math.random() * height : height + this.size + Math.random() * 100;
          this.speedY = -(Math.random() * 0.4 + 0.1); 
          this.speedX = (Math.random() - 0.5) * 0.3;
          this.opacity = Math.random() * 0.5 + 0.1;
        } else if (theme === 'game') {
          // ピクセル風の四角いパーティクル
          this.size = Math.random() * 4 + 2;
          this.x = Math.random() * width;
          this.y = Math.random() * height;
          this.speedY = (Math.random() - 0.5) * 1.5;
          this.speedX = (Math.random() - 0.5) * 1.5;
          this.opacity = Math.random() * 0.7 + 0.1;
          
          this.blinkSpeed = Math.random() * 0.05 + 0.02;
          this.blinkPhase = Math.random() * Math.PI * 2;
        }
      }

      update() {
        this.x += this.speedX;
        this.y += this.speedY;

        if (theme === 'talk') {
          // 上に抜けたらリセット
          if (this.y < -this.size) {
            this.reset();
          }
        } else if (theme === 'game') {
          // 画面全体を漂い、端に到達したらループする
          if (this.x < 0) this.x = width;
          if (this.x > width) this.x = 0;
          if (this.y < 0) this.y = height;
          if (this.y > height) this.y = 0;
          
          // ピクセルは点滅させる
          this.blinkPhase += this.blinkSpeed;
        }
      }

      draw(baseColor) {
        ctx.save();
        if (theme === 'talk') {
          // 円の描画
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
          // ほのかな光彩
          ctx.shadowBlur = 10;
          ctx.shadowColor = 'rgba(255,255,255,0.5)';
          ctx.fill();
        } else if (theme === 'game') {
          // 四角の描画 (+点滅)
          const currentOpacity = this.opacity * (0.5 + 0.5 * Math.sin(this.blinkPhase));
          ctx.fillStyle = baseColor;
          ctx.globalAlpha = currentOpacity;
          
          ctx.shadowBlur = 8;
          ctx.shadowColor = baseColor;
          ctx.fillRect(this.x, this.y, this.size, this.size);
        }
        ctx.restore();
      }
    }

    const particles = [];
    const particleCount = theme === 'talk' ? 60 : 80;
    for (let i = 0; i < particleCount; i++) {
      particles.push(new Particle());
    }

    function animateCanvas() {
      ctx.clearRect(0, 0, width, height);

      const color = getThemeColor();
      for (const p of particles) {
        p.update();
        p.draw(color);
      }

      requestAnimationFrame(animateCanvas);
    }
    // アニメーションループ開始
    animateCanvas();

  </script>
</body>
</html>
